name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game-store-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: game-store-api/pom.xml
      - name: Verify with Maven Wrapper
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode --no-transfer-progress clean verify

  mysql-smoke:
    name: MySQL end-to-end smoke test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4.10
        env:
          MYSQL_DATABASE: game_store_smoke
          MYSQL_USER: game_store
          MYSQL_PASSWORD: ci-database-password
          MYSQL_ROOT_PASSWORD: ci-root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=ci-root-password --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      DB_URL: "jdbc:mysql://127.0.0.1:3306/game_store_smoke?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      DB_USERNAME: game_store
      DB_PASSWORD: ci-database-password
      JWT_SECRET_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      MANAGER_EMAIL: manager-smoke@example.com
      MANAGER_PASSWORD: ci-manager-password-123
    defaults:
      run:
        working-directory: game-store-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: game-store-api/pom.xml
      - name: Run MySQL smoke profile
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode --no-transfer-progress -Pmysql-smoke verify
