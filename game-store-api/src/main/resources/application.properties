spring.application.name=game-store-api
spring.config.import=optional:file:./.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Keep operational exposure limited to health.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Generated OpenAPI JSON and interactive Swagger UI.
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# Keep normal output lightweight. Activate the debug profile only when needed.
logging.level.root=INFO
logging.level.com.gamestore.game_store_api=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [correlationId=%X{correlationId:-none}] %logger{36} - %msg%n

# Never include request payloads or credentials in framework logs.
spring.mvc.log-request-details=false

app.security.jwt.secret-base64=${JWT_SECRET_BASE64}
app.security.jwt.issuer=game-store-api
app.security.jwt.access-token-ttl=PT1H
app.bootstrap.manager-email=${MANAGER_EMAIL}
app.bootstrap.manager-password=${MANAGER_PASSWORD}
