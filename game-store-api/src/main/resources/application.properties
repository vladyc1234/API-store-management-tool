spring.application.name=game-store-api
spring.config.import=optional:file:./.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Keep operational exposure limited to health.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Keep normal output lightweight. Activate the debug profile only when needed.
logging.level.root=INFO
logging.level.com.gamestore.game_store_api=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

app.security.jwt.secret-base64=${JWT_SECRET_BASE64}
app.security.jwt.issuer=game-store-api
app.security.jwt.access-token-ttl=PT1H
app.bootstrap.manager-email=${MANAGER_EMAIL}
app.bootstrap.manager-password=${MANAGER_PASSWORD}
