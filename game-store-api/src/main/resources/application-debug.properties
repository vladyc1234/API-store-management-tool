logging.level.com.gamestore.game_store_api=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Keep the same correlation-aware format while exposing thread names during diagnosis.
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [correlationId=%X{correlationId:-none}] %logger{48} - %msg%n

# Parameter values can contain personal or secret data; keep them out of logs.
logging.level.org.hibernate.orm.jdbc.bind=OFF
