# Tests must not depend on the developer's local MySQL container.
spring.datasource.url=jdbc:h2:mem:game_store_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway migrations will be enabled when the first schema migration is added.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none

# Safe test-only values keep the test suite independent from a local .env file.
app.security.jwt.secret-base64=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
app.bootstrap.manager-email=manager@test.invalid
app.bootstrap.manager-password=test-only-password
